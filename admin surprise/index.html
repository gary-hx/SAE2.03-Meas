<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/ProfileEditForm/style.css" />
  </head>
  <body>
    <section id="log"></section>
    <section id="addMovie"></section>
    <section id="addProfile"></section>
    <section id="profileList"></section>
    <section id="editProfile"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { ProfileForm } from "./component/ProfileForm/script.js";
      import { ProfileEditForm } from "./component/ProfileEditForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      window.C = {};

      C.handlerAddMovie = async function () {
        let form = document.querySelector(".addMovie__form");
        let fd = new FormData(form);
        let res = await DataMovie.update(fd);
        V.renderLog(res);
      };

      C.handlerAddProfile = async function () {
        let form = document.querySelector(".addProfile__form");
        let fd = new FormData(form);
        let res = await DataProfile.addProfile(fd);
        V.renderLog(res);
        let profiles = await DataProfile.requestProfiles();
        V.renderProfileList(profiles);
      };

      C.handlerSelectProfileForEdit = function (id, nom, image, age) {
        document
          .querySelectorAll(".profileList__card")
          .forEach((c) => c.classList.remove("profileList__card--selected"));
        document
          .querySelector(`.profileList__card[data-id="${id}"]`)
          .classList.add("profileList__card--selected");
        ProfileEditForm.fill(id, nom, image, age);
        V.renderLog(
          `Profil "${nom}" sélectionné. Modifiez les champs puis cliquez sur Modifier.`,
        );
      };

      C.handlerUpdateProfile = async function () {
        let form = document.querySelector(".editProfile__form");
        let id = form.querySelector('[name="id"]').value;
        if (!id) {
          V.renderLog(
            "Veuillez sélectionner un profil dans la liste avant de modifier.",
          );
          return;
        }
        let fd = new FormData(form);
        let res = await DataProfile.update(fd);
        V.renderLog(res);
        let profiles = await DataProfile.requestProfiles();
        V.renderProfileList(profiles);
      };

      C.start = async function () {
        V.renderLog("Démarrage de l'application");
        V.renderAddMovie("C.handlerAddMovie()");
        V.renderAddProfile("C.handlerAddProfile()");
        V.renderEditProfile("C.handlerUpdateProfile()");
        let profiles = await DataProfile.requestProfiles();
        V.renderProfileList(profiles);
      };

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderAddMovie = function (handler) {
        let content = document.querySelector("#addMovie");
        content.innerHTML = MovieForm.format(handler);
      };

      V.renderAddProfile = function (handler) {
        let content = document.querySelector("#addProfile");
        content.innerHTML = ProfileForm.format(handler);
      };

      V.renderEditProfile = function (handler) {
        let content = document.querySelector("#editProfile");
        content.innerHTML = ProfileEditForm.format(handler);
      };

      V.renderProfileList = function (profiles) {
        let content = document.querySelector("#profileList");
        if (!Array.isArray(profiles) || profiles.length === 0) {
          content.innerHTML =
            '<div class="profileList"><p>Aucun profil disponible.</p></div>';
          return;
        }
        let cards = "";
        for (let i = 0; i < profiles.length; i++) {
          let p = profiles[i];
          let image = p.image && p.image !== "null" ? p.image : "";
          cards += `<div class="profileList__card" data-id="${p.id}" onclick="C.handlerSelectProfileForEdit(${p.id}, '${p.nom}', '${image}', ${p.restriction_age})">
                <span class="profileList__card-name">${p.nom}</span>
                <span class="profileList__card-age">${p.restriction_age} ans</span>
            </div>`;
        }
        content.innerHTML = `<div class="profileList">
            <h4 class="profileList__title">Sélectionner un profil à modifier</h4>
            <div class="profileList__cards">${cards}</div>
        </div>`;
      };

      C.start();
    </script>
  </body>
</html>
