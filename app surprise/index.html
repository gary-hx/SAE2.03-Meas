<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/ProfileSelector/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <div id="profile-overlay" class="profile-overlay flex-context flex-center"></div>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { ProfileSelector } from "./component/ProfileSelector/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      // URL du serveur (doit correspondre à dataMovie.js)
      const HOST_URL = "https://mmi.unilim.fr/~meas5/SAE2.03-Meas/";

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.activeProfileId = null;
      C.activeProfileName = null;
      C.activeProfileAge = null;

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerHome = function () {
        V.renderMovies(C.activeProfileAge);
      };

      C.handlerDetail = function (id) {
        V.renderMovieDetail(id);
      };

      C.handlerSelectProfile = function (id, name, age, image) {
        C.activeProfileId = id;
        C.activeProfileName = name;
        C.activeProfileAge = age;
        C.activeProfileImage = (image && image !== "null") ? image : null;
        document.querySelector("#profile-overlay").style.display = "none";
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerChangeProfile()",
          { nom: name, image: C.activeProfileImage }
        );
        V.renderMovies(age);
      };

      C.handlerChangeProfile = async function () {
        let profiles = await DataProfile.read();
        V.renderProfiles(profiles);
      };

      C.start = async function () {
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerChangeProfile()",
        );

        let [movies, profiles] = await Promise.all([
          DataMovie.requestMovies(),
          DataProfile.read(),
        ]);

        let groupedMovies = V.groupMoviesByCategory(movies);
        document.querySelector("#content").innerHTML = MovieCategory.format(groupedMovies);

        V.renderProfiles(profiles);
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      V.groupMoviesByCategory = function (movies) {
        let groups = {}; // le résultat qu'on va construire

        for (let i = 0; i < movies.length; i++) {
          let movie = movies[i];
          let category = movie.category || "Autres";

          if (groups[category] == undefined) {
            groups[category] = [];
          }

          groups[category][groups[category].length] = movie; // équivalent de .push()
        }

        return groups;
      };

      V.renderMovies = function (ageLimit) {
        let content = document.querySelector("#content");

        DataMovie.requestMovies(ageLimit)
          .then((movies) => {
            let groupedMovies = V.groupMoviesByCategory(movies);
            content.innerHTML = MovieCategory.format(groupedMovies);
          })
          .catch((error) => {
            console.error("Aucun film disponible pour le moment :", error);
            content.innerHTML = "<p>Aucun film disponible pour le moment.</p>";
          });
      };

      V.renderMovieDetail = function (id) {
        let content = document.querySelector("#content");

        DataMovie.requestMovieDetails(id)
          .then((movie) => {
            content.innerHTML = MovieDetail.format(movie);
          })
          .catch((error) => {
            console.error(
              "Erreur lors du chargement des détails du film :",
              error,
            );
            content.innerHTML =
              "<p>Erreur lors du chargement des détails du film.</p>";
          });
      };

      V.renderProfiles = function (profiles) {
        let overlay = document.querySelector("#profile-overlay");
        overlay.innerHTML = ProfileSelector.format(profiles);
        overlay.style.display = "flex";
      };

      V.renderNavBar = function (hAbout, hHome, hProfile, profile) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, hProfile, profile);
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
