
    <div class="movie-card">
      <img src="{{image}}" alt="{{name}}" class="movie-poster">
      <h2 class="movie-name">{{name}}</h2>
      <p class="movie-id_category">{{id_category}}</p>
      <p class="movie-director">{{director}}</p>
      <p class="movie-year">{{year}}</p>
      <p class="movie-length">{{length}}</p>
      <p class="movie-min_age">{{min_age}}</p>
      <p class="movie-description">{{description}}</p>
      <p class="movie-trailer">{{trailer}}</p>
    </div>
